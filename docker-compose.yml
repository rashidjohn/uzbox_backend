version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       shopuz_db
      POSTGRES_USER:     shopuz_user
      POSTGRES_PASSWORD: shopuz_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuz_user -d shopuz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django backend ─────────────────────────────────────
  backend:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL:           postgres://shopuz_user:shopuz_pass@db:5432/shopuz_db
      REDIS_URL:              redis://redis:6379/0
      SECRET_KEY:             \${SECRET_KEY}
      ALLOWED_HOSTS:          \${ALLOWED_HOSTS:-localhost,127.0.0.1}
      FRONTEND_URL:           \${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS:   \${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120
             --access-logfile -
             --error-logfile -"

  # ── Celery worker ──────────────────────────────────────
  celery:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL:           postgres://shopuz_user:shopuz_pass@db:5432/shopuz_db
      REDIS_URL:              redis://redis:6379/0
      SECRET_KEY:             \${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker --loglevel=info --concurrency=2

  # ── Celery beat (scheduled tasks) ─────────────────────
  celery-beat:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL:           postgres://shopuz_user:shopuz_pass@db:5432/shopuz_db
      REDIS_URL:              redis://redis:6379/0
      SECRET_KEY:             \${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery beat --loglevel=info

volumes:
  postgres_data:
  media_files:
  static_files:
